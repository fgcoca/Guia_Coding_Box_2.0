# 1. Información de la web
site_name: Guia de Coding Box 2.0
site_description: Basada en el microcontrolador ESP32, Coding Box 2.0 es un kit de aprendizaje para niños mayores de 6 años en la que todos los elementos quedan protegidos con el fin de que los pequeños la puedan manejar con total seguridad.
site_author: Federico Coca
site_url: https://fgcoca.github.io/Guia_Coding_Box_2.0/

# 2. Repositorio
repo_name: Guia_Coding_Box_2.0
repo_url: https://github.com/fgcoca/Guia_Coding_Box_2.0
edit_uri: ""

# 3. Footer
copyright:
